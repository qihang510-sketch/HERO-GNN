experiment:
  name: yelp_academic_hero
  seed: 42
dataset:
  name: yelp_academic
  raw_dir: data/raw/yelp_academic
  processed_dir: data/processed/yelp_academic
  label_type: proxy
preprocess:
  proxy_label_mode: hard
  remove_label_features: true
neighbor_retrieval:
  max_target_nodes: null
  max_candidates_per_node: 20
  homophilic_topk: 5
  heterophilic_topk: 5
evidence_chain:
  topk_chains: 3
  max_chain_length: 2
model:
  name: hero_gnn
  hidden_dim: 64
  use_heterophily: true
  use_mechanism: true
  use_chain: true
training:
  epochs: 10
  lr: 0.001
outputs:
  root: outputs
