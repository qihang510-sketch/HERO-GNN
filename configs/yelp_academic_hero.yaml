experiment:
  name: yelp_academic_hero
  seed: 42
dataset:
  name: yelp_academic
  raw_dir: data/raw/yelp_academic
  processed_dir: data/processed/yelp_academic
  label_type: proxy
model:
  name: hero_gnn
  hidden_dim: 64
  use_heterophily: true
  use_mechanism: true
  use_chain: true
training:
  epochs: 10
  lr: 0.001
outputs:
  root: outputs

