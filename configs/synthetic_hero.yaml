experiment:
  name: synthetic_hero
  seed: 42
dataset:
  name: synthetic
  processed_dir: data/processed/synthetic
  num_nodes: 200
  num_edges: 800
  feature_dim: 16
model:
  name: hero_gnn
  hidden_dim: 64
  use_heterophily: true
  use_mechanism: true
  use_chain: true
training:
  epochs: 10
  lr: 0.001
outputs:
  root: outputs

